name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.10"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: CI · Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    name: CI · Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: energy_monitoring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DB: energy_monitoring
      PG_USER: postgres
      PG_PASS: postgres
      DISABLE_DB_LOGGING: "1"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Initialise database schema
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/energy_monitoring" -f db/init.sql
      - name: Run pytest
        run: pytest -v --cov=. --cov-report=xml --cov-report=term

  docker-build:
    name: CI · Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: energy-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate minimal synthetic dataset for smoke test
        run: |
          mkdir -p ci-data
          python << 'PY'
          import pandas as pd
          rows = []
          for country in ["sweden", "norway"]:
              for year in range(2018, 2026):
                  rows.append({
                      "country": country, "year": year,
                      "population": 1e7, "gdp": 5e11,
                      "primary_energy_consumption": 500.0,
                      "energy_per_capita": 30.0, "energy_per_gdp": 1.2,
                      "electricity_demand": 50.0,
                      "electricity_demand_per_capita": 5.0,
                      "fossil_fuel_consumption": 300.0,
                      "fossil_electricity": 15.0, "fossil_share_energy": 40.0,
                      "renewables_consumption": 200.0,
                      "renewables_electricity": 25.0,
                      "renewables_share_energy": 35.0,
                      "low_carbon_electricity": 30.0,
                      "low_carbon_share_energy": 50.0,
                      "solar_electricity": 5.0,
                      "wind_electricity": 10.0,
                      "hydro_electricity": 15.0,
                  })
          pd.DataFrame(rows).to_csv(
              "ci-data/europe_energy_1990_2025_cleaned.csv", index=False
          )
          PY

      - name: Smoke test — does the API start?
        run: |
          docker run -d --name api-smoke \
            -e DISABLE_DB_LOGGING=1 \
            -e SKIP_MODEL_LOAD=1 \
            -e DATA_PATH=/data/europe_energy_1990_2025_cleaned.csv \
            -v "${{ github.workspace }}/ci-data:/data" \
            -p 8000:8000 \
            energy-api:ci
          sleep 10
          curl --fail --silent --show-error http://localhost:8000/ || (docker logs api-smoke && exit 1)
          docker stop api-smoke

  cd:
    name: CD · Build & push image to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
