name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new commit lands.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.10"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================
  # CI — Continuous Integration
  # Runs on every push & PR. Gates the CD job below.
  # =============================================================
  lint:
    name: CI · Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: CI · Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: energy_monitoring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DB: energy_monitoring
      PG_USER: postgres
      PG_PASS: postgres
      DISABLE_DB_LOGGING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Initialise database schema
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/energy_monitoring" -f db/init.sql

      - name: Run pytest
        run: pytest -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  docker-build:
    name: CI · Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: energy-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — does the API start?
        run: |
          docker run -d --name api-smoke \
            -e DISABLE_DB_LOGGING=1 \
            -e SKIP_MODEL_LOAD=1 \
            -p 8000:8000 \
            energy-api:ci
          sleep 8
          curl --fail --silent --show-error http://localhost:8000/ || (docker logs api-smoke && exit 1)
          docker stop api-smoke

  # =============================================================
  # CD — Continuous Deployment
  # Only on push to main + version tags. Skipped on PRs.
  # =============================================================
  cd:
    name: CD · Build & push image to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed tags
        run: |
          echo "Pushed:"
          echo "${{ steps.meta.outputs.tags }}"
