# =============================================================================
# Automated model retraining pipeline.
#
# Note: The real dataset is not committed to the repo. This workflow generates
# a small synthetic dataset at runtime so the training step can execute end to
# end in CI. The R² threshold is calibrated for synthetic data.
#
# For production retraining, replace the "Generate synthetic dataset" step
# with a step that pulls the real dataset from your data source (e.g. S3,
# the OWID API, or a data warehouse).
# =============================================================================

name: Train model

on:
  workflow_dispatch:
    inputs:
      r2_threshold:
        description: "Minimum acceptable R² (workflow fails below this)"
        required: false
        default: "0.5"
  schedule:
    - cron: "0 3 * * 1"  # Mondays at 03:00 UTC

env:
  PYTHON_VERSION: "3.10"

jobs:
  train:
    name: Train, evaluate, gate on R²
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic dataset for CI training
        run: |
          mkdir -p data
          python << 'PY'
          import numpy as np
          import pandas as pd

          rng = np.random.default_rng(42)
          countries = ["sweden", "norway", "denmark"]
          years = list(range(1990, 2021))  # 31 years per country, includes 2020 for test

          rows = []
          for c_idx, country in enumerate(countries):
              for y_idx, year in enumerate(years):
                  base = 100.0 + 5 * c_idx + y_idx + rng.normal(0, 0.3)
                  rows.append({
                      "country": country,
                      "year": year,
                      "population": base * 1e6,
                      "gdp": base * 1e9,
                      "primary_energy_consumption": base * 10,
                      "energy_per_capita": base,
                      "energy_per_gdp": base / 100,
                      "electricity_demand": base * 5,
                      "electricity_demand_per_capita": base / 2,
                      "fossil_fuel_consumption": base * 7,
                      "fossil_electricity": base * 3,
                      "fossil_share_energy": max(0.0, 60 - y_idx),
                      "renewables_consumption": base * 2,
                      "renewables_electricity": base * 1.5,
                      "renewables_share_energy": min(100.0, 20 + y_idx),
                      "low_carbon_electricity": base * 4,
                      "low_carbon_share_energy": min(100.0, 30 + y_idx),
                      "solar_electricity": base * 0.5,
                      "wind_electricity": base * 1.0,
                      "hydro_electricity": base * 2.0,
                  })

          pd.DataFrame(rows).to_csv(
              "data/europe_energy_1990_2025_cleaned.csv", index=False
          )
          print(f"Generated {len(rows)} synthetic rows.")
          PY

      - name: Run training
        run: |
          mkdir -p mlruns models
          python -m batch_processing.train | tee train.log

      - name: Extract R² and enforce threshold
        run: |
          THRESHOLD="${{ github.event.inputs.r2_threshold || '0.5' }}"
          R2=$(grep -oP 'R2 Score: \K[0-9.]+' train.log | tail -n 1)
          echo "Best R²: $R2 (threshold: $THRESHOLD)"
          python -c "
          import sys
          r2 = float('$R2')
          th = float('$THRESHOLD')
          if r2 < th:
              print(f'::error::R² {r2} is below threshold {th} — failing the pipeline.')
              sys.exit(1)
          print(f'::notice::R² {r2} >= threshold {th} — model accepted.')
          "

      - name: Archive MLflow runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          retention-days: 30

      - name: Archive training log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-log
          path: train.log
          retention-days: 30
